<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#0f0f14"/>

  <!-- Title -->
  <text x="50" y="55" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="28" font-weight="700">SQL-over-MCP</text>
  <text x="262" y="55" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="28" font-weight="300"> for Financial Data</text>

  <!-- Flow: Agent → AST → Auth → Postgres → Response -->
  <!-- Agent box -->
  <rect x="50" y="110" width="130" height="65" rx="8" fill="#1a1a26" stroke="#00FF9C" stroke-width="1.5"/>
  <text x="115" y="138" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">AI Agent</text>
  <text x="115" y="158" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">SQL query</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="142" x2="220" y2="142" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="218,137 228,142 218,147" fill="#00FF9C"/>

  <!-- AST box -->
  <rect x="230" y="110" width="130" height="65" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="295" y="138" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">AST Validation</text>
  <text x="295" y="158" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">pglast allowlist</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="142" x2="400" y2="142" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="398,137 408,142 398,147" fill="#00FF9C"/>

  <!-- JWT box -->
  <rect x="410" y="110" width="130" height="65" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="475" y="138" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">JWT + RLS</text>
  <text x="475" y="158" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Row-level security</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="142" x2="580" y2="142" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="578,137 588,142 578,147" fill="#00FF9C"/>

  <!-- Postgres box -->
  <rect x="590" y="110" width="155" height="65" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="667" y="138" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Postgres RPC</text>
  <text x="667" y="158" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">timeout + row cap</text>

  <!-- Divider -->
  <line x1="50" y1="210" x2="750" y2="210" stroke="#2a2a3a" stroke-width="1"/>

  <!-- The core problem -->
  <text x="50" y="245" fill="#888" font-family="system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="2">THE CHALLENGE</text>

  <!-- Problem card -->
  <rect x="50" y="260" width="340" height="145" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1"/>
  <text x="70" y="290" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">JSONB Context Blowout</text>
  <text x="70" y="315" fill="#888" font-family="system-ui, sans-serif" font-size="12">Financial statements: 100–250 KB per row</text>
  <text x="70" y="335" fill="#888" font-family="system-ui, sans-serif" font-size="12">4 companies × 8 periods = 8 MB of JSONB</text>
  <text x="70" y="355" fill="#888" font-family="system-ui, sans-serif" font-size="12">LLM truncates → fills gaps with plausible fiction</text>
  <rect x="70" y="370" width="80" height="22" rx="4" fill="#FF4444" fill-opacity="0.15"/>
  <text x="80" y="385" fill="#FF6666" font-family="system-ui, sans-serif" font-size="11" font-weight="600">8/12 fabricated</text>

  <!-- Solution card -->
  <rect x="410" y="260" width="340" height="145" rx="8" fill="#1a1a26" stroke="#00FF9C" stroke-width="1" stroke-opacity="0.3"/>
  <text x="430" y="290" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Workflow Injection</text>
  <text x="430" y="315" fill="#888" font-family="system-ui, sans-serif" font-size="12">Inject domain-expert SQL patterns</text>
  <text x="430" y="335" fill="#888" font-family="system-ui, sans-serif" font-size="12">JSONB navigation guides, not raw schema</text>
  <text x="430" y="355" fill="#888" font-family="system-ui, sans-serif" font-size="12">Views flatten blobs → 200 bytes/row</text>
  <rect x="430" y="370" width="110" height="22" rx="4" fill="#00FF9C" fill-opacity="0.15"/>
  <text x="440" y="385" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="11" font-weight="600">biggest quality lift</text>

  <!-- Bottom tech line -->
  <text x="50" y="435" fill="#444" font-family="system-ui, sans-serif" font-size="11">FastMCP · Python · Supabase · AWS ECS · stdio + streamable-http</text>
</svg>
