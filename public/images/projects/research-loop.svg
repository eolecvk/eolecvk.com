<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#0f0f14"/>

  <!-- Title -->
  <text x="50" y="55" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="28" font-weight="700">Research Loop</text>
  <text x="262" y="55" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="28" font-weight="300"> for a Multi-Agent Pipeline</text>

  <!-- Pipeline run box -->
  <rect x="50" y="100" width="170" height="120" rx="8" fill="#1a1a26" stroke="#00FF9C" stroke-width="1.5"/>
  <text x="135" y="125" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Pipeline Run</text>
  <text x="135" y="148" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">discovery</text>
  <text x="135" y="164" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">classify · extract</text>
  <text x="135" y="180" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">reconcile</text>
  <text x="135" y="196" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">cross-ref validate</text>
  <text x="135" y="214" fill="#666" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">LangGraph · Claude</text>

  <!-- Arrow: pipeline → spans -->
  <line x1="220" y1="160" x2="260" y2="160" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="258,155 268,160 258,165" fill="#00FF9C"/>
  <text x="240" y="150" fill="#666" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">emit</text>

  <!-- llm_call span box -->
  <rect x="270" y="120" width="160" height="80" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="350" y="143" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">llm_call span</text>
  <text x="350" y="163" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">model · tokens · $</text>
  <text x="350" y="180" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">prompt_hash</text>
  <text x="350" y="195" fill="#666" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">+ failure code</text>

  <!-- Split arrows from spans → two sinks -->
  <line x1="430" y1="145" x2="475" y2="115" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="471,113 480,112 477,121" fill="#00FF9C"/>
  <line x1="430" y1="175" x2="475" y2="200" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="471,202 480,202 478,193" fill="#00FF9C"/>

  <!-- Logfire cloud sink -->
  <rect x="480" y="92" width="135" height="50" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="547" y="115" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Logfire cloud</text>
  <text x="547" y="131" fill="#888" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">analyst UI · SQL</text>

  <!-- OTLP JSONL sink -->
  <rect x="480" y="180" width="135" height="50" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="547" y="203" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">spans.jsonl</text>
  <text x="547" y="219" fill="#888" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">agent-consumable</text>

  <!-- Arrow: sinks → sub-agent -->
  <line x1="615" y1="118" x2="660" y2="150" stroke="#00FF9C" stroke-width="1.5"/>
  <line x1="615" y1="205" x2="660" y2="170" stroke="#00FF9C" stroke-width="1.5"/>
  <polygon points="657,148 666,150 661,158" fill="#00FF9C"/>
  <polygon points="657,172 666,170 661,162" fill="#00FF9C"/>

  <!-- Claude sub-agent box -->
  <rect x="665" y="125" width="110" height="70" rx="8" fill="#1a1a26" stroke="#00FF9C" stroke-width="1.5"/>
  <text x="720" y="150" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Claude</text>
  <text x="720" y="167" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">sub-agent</text>
  <text x="720" y="185" fill="#888" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">upstream-first</text>

  <!-- Divider -->
  <line x1="50" y1="255" x2="750" y2="255" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Outputs label -->
  <text x="50" y="285" fill="#888" font-family="system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="2">AGENT OUTPUTS</text>

  <!-- Triage report card -->
  <rect x="50" y="300" width="210" height="90" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1"/>
  <text x="65" y="325" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Triage report</text>
  <text x="65" y="345" fill="#888" font-family="system-ui, sans-serif" font-size="11">cost breakdown</text>
  <text x="65" y="362" fill="#888" font-family="system-ui, sans-serif" font-size="11">error clusters</text>
  <text x="65" y="379" fill="#888" font-family="system-ui, sans-serif" font-size="11">regression Δ</text>

  <!-- GitHub issue card -->
  <rect x="280" y="300" width="210" height="90" rx="8" fill="#1a1a26" stroke="#2a2a3a" stroke-width="1"/>
  <text x="295" y="325" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600">GitHub issue</text>
  <text x="295" y="345" fill="#888" font-family="system-ui, sans-serif" font-size="11">span IDs attached</text>
  <text x="295" y="362" fill="#888" font-family="system-ui, sans-serif" font-size="11">repro command</text>
  <text x="295" y="379" fill="#888" font-family="system-ui, sans-serif" font-size="11">tagged by stage</text>

  <!-- Next experiment card -->
  <rect x="510" y="300" width="240" height="90" rx="8" fill="#1a1a26" stroke="#00FF9C" stroke-width="1" stroke-opacity="0.3"/>
  <text x="525" y="325" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Next experiment</text>
  <text x="525" y="345" fill="#888" font-family="system-ui, sans-serif" font-size="11">manifest.yaml stub</text>
  <text x="525" y="362" fill="#888" font-family="system-ui, sans-serif" font-size="11">hypothesis + corpus</text>
  <rect x="525" y="370" width="78" height="18" rx="4" fill="#00FF9C" fill-opacity="0.15"/>
  <text x="532" y="383" fill="#00FF9C" font-family="system-ui, sans-serif" font-size="10" font-weight="600">closes the loop</text>

  <!-- Loop arrow: next experiment → pipeline run -->
  <path d="M 630 390 Q 630 420 400 420 Q 135 420 135 235" stroke="#00FF9C" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
  <polygon points="130,238 135,228 140,238" fill="#00FF9C"/>

  <!-- Bottom tech line -->
  <text x="50" y="435" fill="#444" font-family="system-ui, sans-serif" font-size="11">Logfire · OpenTelemetry · LangGraph · Claude Code sub-agents · Python query API</text>
</svg>
